# Deploy web.py (FastAPI, UI custom yang cantik) ke Render.
# Cara: push repo ke GitHub → render.com → New → Blueprint → pilih repo ini.
services:
  - type: web
    name: osint-username-checker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
